<!DOCTYPE html>
<html>
<head>
    <title>Form 1 - Name Validation</title>
</head>
<body>

<h2>Form 1</h2>

<form onsubmit="return validateForm()">
    Name: <input type="text" id="name">
    <br><br>
    <input type="submit" value="Submit">
</form>

<script>
function validateForm() {
    var name = document.getElementById("name").value;

    if (name == "") {
        alert("Name cannot be empty");
        return false;
    }

    let validChars = "abcdefghijklmnopqrstuvwxyzABCDEFGHIJKLMNOPQRSTUVWXYZ. -";
    
    if (!validChars.includes(name.charAt(0)) || name.charAt(0) === '.' || name.charAt(0) === '-' || name.charAt(0) === ' ') {
        alert("Invalid characters or must start with letter");
        return false;
    }
    
    for (let i = 1; i < name.length; i++) {
        if (!validChars.includes(name[i])) {
            alert("Invalid characters or must start with letter");
            return false;
        }
    }

    if (name.trim().split(" ").length < 2) {
        alert("Must contain at least two words");
        return false;
    }

    return true;
}
</script>

</body>
</html>
