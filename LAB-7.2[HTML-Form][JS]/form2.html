<!DOCTYPE html>
<html>
<head>
    <title>Form 2 - Email Validation</title>

    <style>
        .icon {
            display: inline-block;
            width: 18px;
            height: 18px;
            border-radius: 50%;
            background-color: lightgray;
            text-align: center;
            cursor: pointer;
            font-weight: bold;
        }

        #hint {
            display: none;
            margin-left: 10px;
            color: gray;
        }
    </style>

</head>
<body>

<h2>Form 2</h2>

<form onsubmit="return validateForm()">

    Email:
    <input type="text" id="email">

    <span class="icon" onclick="showHint()">i</span>

    <span id="hint">hint: sample@example.com</span>

    <br><br>
    <input type="submit" value="Submit">

</form>

<script>

function showHint() {
    var hint = document.getElementById("hint");
    hint.style.display = "inline";
}

function validateForm() {

    var email = document.getElementById("email").value;

    if (email == "") {
        alert("Email cannot be empty");
        return false;
    }


    if (!email.includes("@")) {
        alert("Invalid email address");
        return false;
    }
    
    let parts = email.split("@");
    if (parts.length !== 2 || parts[0] === "" || parts[1] === "") {
        alert("Invalid email address");
        return false;
    }
    
    if (parts[0].includes(" ") || parts[1].includes(" ")) {
        alert("Invalid email address");
        return false;
    }
    
    if (!parts[1].includes(".")) {
        alert("Invalid email address");
        return false;
    }
    
    let domainParts = parts[1].split(".");
    if (domainParts.length !== 2 || domainParts[1] === "" || domainParts[1].length < 2 || domainParts[1].length > 3) {
        alert("Invalid email address");
        return false;
    }
    

    let isValidExtension = true;
    for (let j = 0; j < domainParts[1].length; j++) {
        let charCode = domainParts[1].charCodeAt(j);
        if (charCode < 97 || charCode > 122) {
            isValidExtension = false;
            break;
        }
    }
    
    if (!isValidExtension) {
        alert("Invalid email address");
        return false;
    }

    return true;
}

</script>

</body>
</html>
