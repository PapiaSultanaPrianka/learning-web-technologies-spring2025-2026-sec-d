<!DOCTYPE html>
<html>
<head>
    <title>Form 2 - Email Validation</title>

    <style>
        .icon {
            display: inline-block;
            width: 18px;
            height: 18px;
            border-radius: 50%;
            background-color: lightgray;
            text-align: center;
            cursor: pointer;
            font-weight: bold;
        }

        #hint {
            display: none;
            margin-left: 10px;
            color: gray;
        }
    </style>

</head>
<body>

<h2>Form 2</h2>

<form onsubmit="return validateForm()">

    Email:
    <input type="text" id="email">

    <span class="icon" onclick="showHint()">i</span>

    <span id="hint">hint: sample@example.com</span>

    <br><br>
    <input type="submit" value="Submit">

</form>

<script>

function showHint() {
    var hint = document.getElementById("hint");
    hint.style.display = "inline";
}

function validateForm() {

    var email = document.getElementById("email").value;

    if (email == "") {
        alert("Email cannot be empty");
        return false;
    }

    var pattern = /^[^ ]+@[^ ]+\.[a-z]{2,3}$/;

    if (!pattern.test(email)) {
        alert("Invalid email address");
        return false;
    }

    return true;
}

</script>

</body>
</html>
