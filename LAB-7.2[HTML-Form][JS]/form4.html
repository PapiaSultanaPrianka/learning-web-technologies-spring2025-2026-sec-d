<!DOCTYPE html>
<html>
<head>
    <title>Form 4 - Date of Birth</title>

    <style>
        .box {
            width: 300px;
            border: 1px solid black;
            padding: 15px;
        }

        input[type="text"] {
            width: 40px;
            height: 25px;
            text-align: center;
        }

        #year {
            width: 60px;
        }

        hr {
            margin-top: 15px;
            margin-bottom: 15px;
        }
    </style>
</head>
<body>

<h3>4.</h3>

<div class="box">
    <b>Date of Birth</b>
    <br><br>

    dd &nbsp;&nbsp;&nbsp;&nbsp; mm &nbsp;&nbsp;&nbsp;&nbsp; yyyy
    <br><br>

    <form onsubmit="return validateForm()">
        <input type="text" id="dd"> /
        <input type="text" id="mm"> /
        <input type="text" id="year">
        
        <hr>

        <input type="submit" value="Submit">
    </form>
</div>

<script>
function validateForm() {

    var dd = document.getElementById("dd").value;
    var mm = document.getElementById("mm").value;
    var yyyy = document.getElementById("year").value;

    if (dd == "" || mm == "" || yyyy == "") {
        alert("Fields cannot be empty");
        return false;
    }

    if (isNaN(dd) || dd < 0 || dd > 31) {
        alert("Day must be between 0-31");
        return false;
    }

    if (isNaN(mm) || mm < 1 || mm > 12) {
        alert("Month must be between 1-12");
        return false;
    }

    if (isNaN(yyyy) || yyyy < 1900 || yyyy > 2016) {
        alert("Year must be between 1900-2016");
        return false;
    }

    return true;
}
</script>

</body>
</html>
