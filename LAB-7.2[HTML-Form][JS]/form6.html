<!DOCTYPE html>
<html>
<head>
    <title>Form 6 - Blood Group</title>
</head>
<body>

<h2>Form 6</h2>

<form onsubmit="return validateForm()">
    Blood Group:
    <select id="blood">
        <option value="">Select</option>
        <option>A+</option>
        <option>B+</option>
        <option>O+</option>
    </select>
    <br><br>
    <input type="submit" value="Submit">
</form>

<script>
function validateForm() {
    var blood = document.getElementById("blood").value;

    if (blood == "") {
        alert("Please select blood group");
        return false;
    }

    return true;
}
</script>

</body>
</html>
