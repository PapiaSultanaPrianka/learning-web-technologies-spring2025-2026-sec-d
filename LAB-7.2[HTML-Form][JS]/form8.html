<!DOCTYPE html>
<html>
<head>
    <title>Form 8 - Person Profile</title>

    <style>
        .icon {
            display: inline-block;
            width: 18px;
            height: 18px;
            border-radius: 50%;
            background-color: lightgray;
            text-align: center;
            cursor: pointer;
            font-weight: bold;
        }

        #hint {
            display: none;
            margin-left: 10px;
            color: gray;
        }

        .box {
            width: 300px;
            border: 1px solid black;
            padding: 15px;
        }

        input[type="text"] {
            width: 150px;
            height: 25px;
        }

        #dd, #mm {
            width: 40px;
            text-align: center;
        }

        #year {
            width: 60px;
            text-align: center;
        }
    </style>
</head>

<body>

<h1>Person Profile</h1>

<form onsubmit="return validateForm()">

    <!-- Form 1 -->
    Name: <input type="text" id="name">
    <br><br>

    <!-- Form 2 -->
    Email:
    <input type="text" id="email">
    <span class="icon" onclick="showHint()">i</span>
    <span id="hint">hint: sample@example.com</span>
    <br><br>

    <!-- Form 3 -->
    Gender:<br>
    <input type="radio" name="gender" value="Male"> Male
    <input type="radio" name="gender" value="Female"> Female
    <input type="radio" name="gender" value="Other"> Other
    <br><br>

    <!-- Form 4 -->
    <div class="box">
        <b>Date of Birth</b><br><br>
        dd &nbsp;&nbsp; mm &nbsp;&nbsp; yyyy<br><br>
        <input type="text" id="dd"> /
        <input type="text" id="mm"> /
        <input type="text" id="year">
    </div>
    <br>

    <!-- Form 5 -->
    Degree:<br>
    <input type="checkbox" name="degree" value="SSC"> SSC
    <input type="checkbox" name="degree" value="HSC"> HSC
    <input type="checkbox" name="degree" value="BSc"> BSc
    <br><br>

    <!-- Form 6 -->
    Blood Group:
    <select id="blood">
        <option value="">Select</option>
        <option>A+</option>
        <option>B+</option>
        <option>O+</option>
    </select>
    <br><br>

    <!-- Form 7 -->
    User ID: <input type="text" id="userid"><br><br>
    Picture: <input type="file" id="pic"><br><br>

    <input type="submit" value="Submit">
    <input type="reset" value="Reset">

</form>

<script>

function showHint() {
    var hint = document.getElementById("hint");
    hint.style.display = "inline";
}

function validateForm() {

    // Name validation
    var name = document.getElementById("name").value;
    if (name == "") {
        alert("Name cannot be empty");
        return false;
    }

    let validNameChars = "abcdefghijklmnopqrstuvwxyzABCDEFGHIJKLMNOPQRSTUVWXYZ. -";
    
    if (!validNameChars.includes(name.charAt(0)) || name.charAt(0) === '.' || name.charAt(0) === '-' || name.charAt(0) === ' ') {
        alert("Invalid characters or must start with letter");
        return false;
    }
    
    for (let i = 1; i < name.length; i++) {
        if (!validNameChars.includes(name[i])) {
            alert("Invalid characters or must start with letter");
            return false;
        }
    }
    if (name.trim().split(" ").length < 2) {
        alert("Must contain at least two words");
        return false;
    }

    // Email validation
    var email = document.getElementById("email").value;
    if (email == "") {
        alert("Email cannot be empty");
        return false;
    }

    if (!email.includes("@")) {
        alert("Invalid email address");
        return false;
    }
    
    let emailParts = email.split("@");
    if (emailParts.length !== 2 || emailParts[0] === "" || emailParts[1] === "") {
        alert("Invalid email address");
        return false;
    }
    
    if (emailParts[0].includes(" ") || emailParts[1].includes(" ")) {
        alert("Invalid email address");
        return false;
    }
    
    if (!emailParts[1].includes(".")) {
        alert("Invalid email address");
        return false;
    }
    
    let domainParts = emailParts[1].split(".");
    if (domainParts.length !== 2 || domainParts[1] === "" || domainParts[1].length < 2 || domainParts[1].length > 3) {
        alert("Invalid email address");
        return false;
    }
    
    let isValidExt = true;
    for (let j = 0; j < domainParts[1].length; j++) {
        let charCode = domainParts[1].charCodeAt(j);
        if (charCode < 97 || charCode > 122) {
            isValidExt = false;
            break;
        }
    }
    
    if (!isValidExt) {
        alert("Invalid email address");
        return false;
    }

    // Gender validation
    var gender = document.getElementsByName("gender");
    var selectedGender = false;
    for (var i = 0; i < gender.length; i++) {
        if (gender[i].checked) {
            selectedGender = true;
        }
    }
    if (!selectedGender) {
        alert("Please select one option");
        return false;
    }

    // Date validation
    var dd = document.getElementById("dd").value;
    var mm = document.getElementById("mm").value;
    var yyyy = document.getElementById("year").value;

    if (dd == "" || mm == "" || yyyy == "") {
        alert("Fields cannot be empty");
        return false;
    }
    if (isNaN(dd) || dd < 0 || dd > 31) {
        alert("Day must be between 0-31");
        return false;
    }
    if (isNaN(mm) || mm < 1 || mm > 12) {
        alert("Month must be between 1-12");
        return false;
    }
    if (isNaN(yyyy) || yyyy < 1900 || yyyy > 2016) {
        alert("Year must be between 1900-2016");
        return false;
    }

    // Degree validation
    var degree = document.getElementsByName("degree");
    var selectedDegree = false;
    for (var i = 0; i < degree.length; i++) {
        if (degree[i].checked) {
            selectedDegree = true;
        }
    }
    if (!selectedDegree) {
        alert("Select at least one degree");
        return false;
    }

    // Blood group validation
    var blood = document.getElementById("blood").value;
    if (blood == "") {
        alert("Please select blood group");
        return false;
    }

    // User ID & Picture validation
    var id = document.getElementById("userid").value;
    var pic = document.getElementById("pic").value;

    if (id == "" || id <= 0) {
        alert("User ID must be positive number");
        return false;
    }

    if (pic == "") {
        alert("Picture cannot be empty");
        return false;
    }

    return true;
}

</script>

</body>
</html>
