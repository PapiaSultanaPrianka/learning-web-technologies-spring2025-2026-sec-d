<!DOCTYPE html>
<html>
<head>
<title>Tic Tac Toe</title>

<style>
#board{
display:grid;
grid-template-columns:repeat(3,100px);
gap:5px;
margin:20px 0;
}

.cell{
width:100px;
height:100px;
background:#eee;
font-size:40px;
text-align:center;
line-height:100px;
cursor:pointer;
}

.win{
background:lightgreen;
}
</style>

</head>
<body>

<h2>Tic Tac Toe</h2>

<div id="status">Current Player: X</div>

<div id="board">
<div class="cell"></div>
<div class="cell"></div>
<div class="cell"></div>
<div class="cell"></div>
<div class="cell"></div>
<div class="cell"></div>
<div class="cell"></div>
<div class="cell"></div>
<div class="cell"></div>
</div>

<button id="reset">Reset Game</button>

<script src="script.js"></script>

</body>
</html>
