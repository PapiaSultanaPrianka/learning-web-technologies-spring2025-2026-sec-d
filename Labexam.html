<!DOCTYPE html>
<html>

<head>
<title>Tic Tac Toe</title>

<style>

body{
    font-family: Arial;
    text-align: center;
}

#board{
    width:300px;
    margin:auto;
}

.cell{
    width:100px;
    height:100px;
    border:1px solid black;
    font-size:40px;
    float:left;
    display:flex;
    justify-content:center;
    align-items:center;
    cursor:pointer;
}
